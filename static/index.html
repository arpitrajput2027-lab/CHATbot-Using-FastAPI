<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat with AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --surface: #f7f7f8;
      --border: #e5e5e5;
      --text: #111111;
      --muted: #888888;
      --accent: #2563eb;
      --user-bg: #2563eb;
      --bot-bg: #f3f4f6;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f0f0f;
        --surface: #1a1a1a;
        --border: #2a2a2a;
        --text: #f0f0f0;
        --muted: #666666;
        --user-bg: #2563eb;
        --bot-bg: #1e1e1e;
      }
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }

    .app { display: flex; flex-direction: column; height: 100dvh; max-width: 65vw; margin: 0 auto; }

    /* header */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
    }
    .header-name { font-size: 15px; font-weight: 500; }
    .header-meta { font-size: 9px; color: rgb(209, 201, 201); display: flex; align-items: center; gap: 6px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; }
    .clear-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      font-family: inherit; font-size: 12px; padding: 4px 10px;
      border-radius: 6px; cursor: pointer; 
    }
    .clear-btn:hover { color: var(--text); border-color: var(--muted); }

    /* messages */
    .messages {
      flex: 1; overflow-y: auto; padding: 24px 20px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); }

    /* welcome */
    .welcome { margin: auto; text-align: center; }
    .welcome h2 { font-size: 18px; font-weight: 500; margin-bottom: 6px; }
    .welcome p { font-size: 13px; color: var(--muted); }
    .hints { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 20px; }
    .hint {
      border: 1px solid var(--border); background: none; color: var(--muted);
      font-family: inherit; font-size: 12px; padding: 6px 12px;
      border-radius: 99px; cursor: pointer;
    }
    .hint:hover { color: var(--text); border-color: var(--muted); }

    /* bubbles */
    .msg { display: flex; gap: 10px; align-items: flex-end; animation: fadeUp 0.2s ease forwards; opacity: 0; }
    .msg.user { flex-direction: row-reverse; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .bubble {
      max-width: 75%; padding: 10px 14px;
      font-size: 14px; line-height: 1.65;
       /* word-break: break-word;
      white-space: pre-wrap; */
       white-space: pre-wrap;   /* line breaks preserve karega */
    overflow-wrap: break-word;
    word-wrap: break-word;
    }
    .msg.user .bubble {
      background: var(--user-bg); color: #fff;
      border-radius: 16px 16px 4px 16px;
      border: 1px solid rgb(151, 145, 145);
    }
    .msg.bot .bubble {
      background: var(--bot-bg); color: var(--text);
      border-radius: 16px 16px 16px 4px;
      border: 1px solid rgb(151, 145, 145);
    }
    .bubble.error { background: #fef2f2; color: #dc2626; border-radius: 16px 16px 16px 4px; }
    @media (prefers-color-scheme: dark) { .bubble.error { background: #1f0f0f; color: #f87171; } }

    .time { font-size: 10px; color: var(--muted); padding: 0 2px 2px; }

    /* typing */
    .typing { display: flex; align-items: center; gap: 4px; padding: 12px 14px; background: var(--bot-bg); border-radius: 16px 16px 16px 4px; width: fit-content; }
    .typing span { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); animation: bounce 1.1s ease-in-out infinite; }
    .typing span:nth-child(2) { animation-delay: 0.18s; }
    .typing span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-5px); } }

    /* code */
    .bubble code { background: rgba(0,0,0,0.08); padding: 1px 5px; border-radius: 4px; font-size: 12px; font-family: monospace; }
    @media (prefers-color-scheme: dark) { .bubble code { background: rgba(255,255,255,0.1); } }
    .bubble pre { background: rgba(0,0,0,0.06); border-radius: 8px; padding: 12px; margin: 8px 0; overflow-x: auto; font-size: 12px; }
    .bubble pre code { background: none; padding: 0; }

    /* input */
    .input-area { padding: 12px 20px 20px; border-top: 1px solid var(--border); }
    .input-box {
      display: flex; align-items: flex-end; gap: 8px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 8px 8px 8px 14px;
    }
    .input-box:focus-within { border-color: var(--accent); }
    #userInput {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-family: inherit; font-size: 14px;
      resize: none; max-height: 120px; line-height: 1.5; padding: 2px 0;
    }
    #userInput::placeholder { color: var(--muted); }
    .send-btn {
      width: 34px; height: 34px; background: var(--accent); border: none;
      border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .send-btn:hover { opacity: 0.9; }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .send-btn svg { width: 15px; height: 15px; fill: #fff; }
    .input-hint { font-size: 11px; color: var(--muted); margin-top: 6px; padding: 0 2px; }
  </style>
</head>
<body>
<div class="app">

  <header class="header">
    <div>
      <div class="header-name">Chat With AI </div>
      <div class="header-meta"><div class="dot"></div>Made with using Fast API + (HTML+CSS+Js) + Sarvam LLM API</div>
    </div>
    <button class="clear-btn" onclick="clearChat()">Clear</button>
  </header>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <h2>Namaste 👋</h2>
      <p>Ask Your Question in Any Language....</p>
      <div class="hints">
        <button class="hint" onclick="useHint(this)">What is Pyhton</button>
        <button class="hint" onclick="useHint(this)">Explain machine learning</button>
        <button class="hint" onclick="useHint(this)">Ek joke sunao</button>
        <button class="hint" onclick="useHint(this)">Write a short email</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-box">
      <textarea id="userInput" rows="1" placeholder="Message..."></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="input-hint">Enter to send · Shift+Enter for newline</div>
  </div>

</div>
<script>
  let history = [], loading = false;
  const messagesEl = document.getElementById('messages');
  const input = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const welcome = document.getElementById('welcome');

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!loading) sendMessage(); }
  });

  function useHint(el) { input.value = el.textContent; input.focus(); }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || loading) return;
    welcome && (welcome.style.display = 'none');
    history.push({ role: 'user', content: text });
    addBubble('user', text);
    input.value = ''; input.style.height = 'auto';
    const typing = addTyping();
    setLoading(true);
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Error');
      history.push({ role: 'assistant', content: data.reply });
      typing.remove();
      addBubble('bot', data.reply);
    } catch(e) {
      typing.remove();
      addBubble('bot', '⚠ ' + e.message, true);
    }
    setLoading(false);
    scroll();
  }

  function addBubble(role, text, err = false) {
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + role;
    const bw = document.createElement('div');
    const b = document.createElement('div');
    b.className = 'bubble' + (err ? ' error' : '');
    b.innerHTML = fmt(text);
    const t = document.createElement('div');
    t.className = 'time';
    t.textContent = new Date().toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });
    bw.appendChild(b); bw.appendChild(t);
    wrap.appendChild(bw);
    messagesEl.appendChild(wrap);
    scroll();
  }

  function addTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg bot';
    const t = document.createElement('div');
    t.className = 'typing';
    t.innerHTML = '<span></span><span></span><span></span>';
    wrap.appendChild(t);
    messagesEl.appendChild(wrap);
    scroll();
    return wrap;
  }

  function fmt(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>')
      .replace(/`([^`]+)`/g,'<code>$1</code>')
      .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
      .replace(/\n/g,'<br>');
  }

  function scroll() { setTimeout(() => messagesEl.scrollTop = messagesEl.scrollHeight, 50); }
  function setLoading(s) { loading = s; sendBtn.disabled = s; input.disabled = s; }
  function clearChat() {
    if (!history.length) return;
    history = [];
    messagesEl.querySelectorAll('.msg').forEach(m => m.remove());
    welcome && (welcome.style.display = 'block');
  }

  input.focus();
</script>
</body>
</html>
